services:
  pro-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: professionalbs
      POSTGRES_USER: professionalbs
      POSTGRES_PASSWORD: professionalbs
    volumes:
      - pro_postgres_data:/var/lib/postgresql/data

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - pro-db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pro-main.rule=Host(`pro.aiinvention.tech`)"
      - "traefik.http.routers.pro-main.entrypoints=websecure"
      - "traefik.http.routers.pro-main.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pro-main.service=pro-main"
      - "traefik.http.services.pro-main.loadbalancer.server.port=3000"
      - "traefik.http.routers.pro-admin.rule=Host(`admin-pro.aiinvention.tech`)"
      - "traefik.http.routers.pro-admin.entrypoints=websecure"
      - "traefik.http.routers.pro-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pro-admin.service=pro-admin"
      - "traefik.http.services.pro-admin.loadbalancer.server.port=3000"
    networks:
      - default
      - ai-invention_default

networks:
  ai-invention_default:
    external: true

volumes:
  pro_postgres_data:
